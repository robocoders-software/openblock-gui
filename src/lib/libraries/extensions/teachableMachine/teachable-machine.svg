<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 90">
  <rect width="120" height="90" rx="8" fill="#FF8C1A"/>
  <!-- Input layer -->
  <circle cx="18" cy="30" r="8" fill="white" opacity="0.9"/>
  <circle cx="18" cy="55" r="8" fill="white" opacity="0.9"/>
  <circle cx="18" cy="78" r="8" fill="white" opacity="0.9"/>
  <!-- Hidden layer -->
  <circle cx="50" cy="20" r="8" fill="white" opacity="0.9"/>
  <circle cx="50" cy="42" r="8" fill="white" opacity="0.9"/>
  <circle cx="50" cy="64" r="8" fill="white" opacity="0.9"/>
  <circle cx="50" cy="82" r="8" fill="white" opacity="0.7"/>
  <!-- Output layer -->
  <circle cx="85" cy="35" r="9" fill="white"/>
  <circle cx="85" cy="62" r="9" fill="white"/>
  <!-- Connections input->hidden -->
  <line x1="26" y1="30" x2="42" y2="20" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="26" y1="30" x2="42" y2="42" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="26" y1="55" x2="42" y2="42" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="26" y1="55" x2="42" y2="64" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="26" y1="78" x2="42" y2="64" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="26" y1="78" x2="42" y2="82" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <!-- Connections hidden->output -->
  <line x1="58" y1="20" x2="76" y2="35" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="58" y1="42" x2="76" y2="35" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="58" y1="42" x2="76" y2="62" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="58" y1="64" x2="76" y2="62" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <line x1="58" y1="82" x2="76" y2="62" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="85" y="38" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#FF8C1A" font-weight="bold">A</text>
  <text x="85" y="65" text-anchor="middle" font-family="sans-serif" font-size="6" fill="#FF8C1A" font-weight="bold">B</text>
  <!-- Checkmark on output -->
  <circle cx="108" cy="35" r="9" fill="rgba(255,255,255,0.9)"/>
  <polyline points="104,35 107,39 113,31" fill="none" stroke="#FF8C1A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
